<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .token { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 56px; height: 40px; background: var(--color-surface-variant); border: 1px solid rgba(255,255,255,0.1); }
  .label { font-size: 10px; color: var(--fg2); font-family: var(--font-mono); text-align: center; }
  .val { font-size: 9px; color: var(--fg3); font-family: var(--font-mono); }
  .section-title { font-size: 11px; font-weight: 600; color: var(--fg2); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 12px; }
</style>
</head><body>
<div class="section-title">Border Radii</div>
<div class="row">
  <div class="token"><div class="box" style="border-radius:0px;"></div><div class="label">none</div><div class="val">0px</div></div>
  <div class="token"><div class="box" style="border-radius:8px;"></div><div class="label">radius-sm</div><div class="val">8px · OTP</div></div>
  <div class="token"><div class="box" style="border-radius:12px;"></div><div class="label">radius-md</div><div class="val">12px · Input</div></div>
  <div class="token"><div class="box" style="border-radius:16px;"></div><div class="label">radius-lg</div><div class="val">16px · Card/Btn</div></div>
  <div class="token"><div class="box" style="border-radius:24px;"></div><div class="label">radius-xl</div><div class="val">24px · Hero</div></div>
  <div class="token"><div class="box" style="border-radius:9999px;"></div><div class="label">radius-full</div><div class="val">9999px · Pill</div></div>
</div>
</body></html>
