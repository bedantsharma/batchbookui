<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--fg2); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; }
  .card { background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-3); padding: 24px; }
  .card-sm { width: 200px; }
  .card-md { width: 260px; }
  .card-title { font-size: 16px; font-weight: 600; color: var(--fg1); margin: 0 0 6px; }
  .card-body { font-size: 13px; color: var(--fg2); line-height: 1.5; margin: 0 0 16px; }
  .divider { border: none; border-top: 1px solid var(--color-outline); margin: 12px 0; }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 500; background: rgba(187,134,252,0.15); color: var(--color-primary-mui); }
  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head><body>
<div class="section-title">Card Variants</div>
<div class="row">
  <!-- Default card -->
  <div class="card card-sm">
    <div class="card-title">Default Card</div>
    <div class="card-body">Surface background, shadow-3, 16px radius.</div>
    <div class="badge-row">
      <div class="chip">Active</div>
    </div>
  </div>

  <!-- Auth card (matches app screens) -->
  <div class="card card-md" style="text-align:center;">
    <div style="font-size:22px; font-weight:700; color:var(--fg1); margin-bottom:6px;">Login with Phone</div>
    <div style="font-size:13px; color:var(--fg2); margin-bottom:20px;">Enter your 10-digit Indian phone number to receive an OTP.</div>
    <div style="background:transparent; border:1px solid var(--color-outline); border-radius:12px; padding:12px 14px; color:var(--fg3); font-size:14px; text-align:left; margin-bottom:12px;">e.g., 9876543210</div>
    <button style="width:100%; background:var(--color-primary-mui); color:#000; border:none; border-radius:16px; padding:13px; font-size:15px; font-weight:600; font-family:var(--font-sans); cursor:pointer;">Get OTP</button>
  </div>

  <!-- Outlined card variant -->
  <div class="card card-sm" style="background:transparent; border:1px solid var(--color-outline); box-shadow:none;">
    <div class="card-title">Outlined Card</div>
    <div class="card-body">No shadow, border only.</div>
  </div>
</div>
</body></html>
