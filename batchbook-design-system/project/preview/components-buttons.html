<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--fg2); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; }
  button { font-family: var(--font-sans); cursor: pointer; letter-spacing: 0.05em; font-weight: 500; font-size: 14px; transition: all 0.15s ease; }

  .btn-filled { background: var(--color-primary-mui); color: #000; border: none; border-radius: var(--radius-lg); padding: 10px 24px; }
  .btn-filled:hover { background: var(--color-primary-400); box-shadow: var(--shadow-primary-vivid); }

  .btn-tonal { background: var(--color-primary-container); color: var(--color-primary-mui); border: none; border-radius: var(--radius-lg); padding: 10px 24px; }
  .btn-tonal:hover { background: #4a00c8; }

  .btn-outlined { background: transparent; color: var(--color-primary-mui); border: 1px solid var(--color-primary-mui); border-radius: var(--radius-lg); padding: 10px 24px; }
  .btn-outlined:hover { background: rgba(187,134,252,0.08); }

  .btn-text { background: transparent; color: var(--color-primary-mui); border: none; border-radius: var(--radius-lg); padding: 10px 16px; }
  .btn-text:hover { background: rgba(187,134,252,0.08); }

  .btn-disabled { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.38); border: none; border-radius: var(--radius-lg); padding: 10px 24px; cursor: not-allowed; }

  .btn-loading { background: var(--color-primary-mui); color: #000; border: none; border-radius: var(--radius-lg); padding: 10px 24px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-icon { background: var(--color-primary-container); color: var(--color-primary-mui); border: none; border-radius: var(--radius-full); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

  .btn-sm { padding: 6px 16px; font-size: 12px; }
  .btn-lg { padding: 14px 32px; font-size: 16px; }
</style>
</head><body>
<div class="section-title">Button Variants</div>
<div class="row">
  <button class="btn-filled">Filled</button>
  <button class="btn-tonal">Tonal</button>
  <button class="btn-outlined">Outlined</button>
  <button class="btn-text">Text</button>
  <button class="btn-disabled">Disabled</button>
  <button class="btn-loading"><div class="spinner"></div>Loading…</button>
  <button class="btn-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>
<div class="section-title">Sizes</div>
<div class="row">
  <button class="btn-filled btn-sm">Small</button>
  <button class="btn-filled">Medium</button>
  <button class="btn-filled btn-lg">Large</button>
</div>
<div class="section-title">Full Width (form context)</div>
<div class="row" style="flex-direction:column; align-items:stretch; max-width:320px; gap:8px;">
  <button class="btn-filled" style="width:100%; padding:14px;">Get OTP</button>
  <button class="btn-outlined" style="width:100%; padding:14px;">Resend OTP</button>
</div>
</body></html>
