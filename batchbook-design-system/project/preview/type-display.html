<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-mono); padding: 20px; }
  .specimen { margin-bottom: 12px; display: flex; align-items: baseline; gap: 16px; }
  .meta { font-size: 10px; color: var(--fg3); font-family: var(--font-mono); min-width: 140px; flex-shrink: 0; line-height: 1.4; }
  .divider { border: none; border-top: 1px solid var(--color-outline); margin: 6px 0; }
</style>
</head><body>
  <div class="specimen">
    <div class="meta">Display Medium<br>45px / 400</div>
    <div style="font-family:'JetBrains Mono'; font-size:45px; font-weight:400; color:var(--fg1); line-height:1; letter-spacing:-0.25px;">BatchBook</div>
  </div>
  <hr class="divider">
  <div class="specimen">
    <div class="meta">Headline Large<br>32px / 700</div>
    <div style="font-family:'JetBrains Mono'; font-size:32px; font-weight:700; color:var(--fg1); line-height:1.2;">Login with Phone</div>
  </div>
  <div class="specimen">
    <div class="meta">Headline Medium<br>28px / 700</div>
    <div style="font-family:'JetBrains Mono'; font-size:28px; font-weight:700; color:var(--fg1); line-height:1.2;">Verify OTP</div>
  </div>
  <div class="specimen">
    <div class="meta">Headline Small<br>24px / 600</div>
    <div style="font-family:'JetBrains Mono'; font-size:24px; font-weight:600; color:var(--fg1); line-height:1.3;">Welcome to BatchBook</div>
  </div>
  <hr class="divider">
  <div class="specimen">
    <div class="meta">Title Large<br>22px / 600</div>
    <div style="font-family:'JetBrains Mono'; font-size:22px; font-weight:600; color:var(--fg1);">Your Dashboard</div>
  </div>
  <div class="specimen">
    <div class="meta">Title Medium<br>16px / 500</div>
    <div style="font-family:'JetBrains Mono'; font-size:16px; font-weight:500; color:var(--fg1);">Phone Number</div>
  </div>
</body></html>
