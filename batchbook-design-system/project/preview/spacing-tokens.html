<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .token { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); border-radius: 3px; width: 24px; }
  .label { font-size: 10px; color: var(--fg2); font-family: var(--font-mono); text-align: center; }
  .val { font-size: 9px; color: var(--fg3); font-family: var(--font-mono); }
  .section-title { font-size: 11px; font-weight: 600; color: var(--fg2); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 12px; }
</style>
</head><body>
<div class="section-title">Spacing Scale (8px base)</div>
<div class="row">
  <div class="token"><div class="bar" style="height:4px;"></div><div class="label">space-1</div><div class="val">4px</div></div>
  <div class="token"><div class="bar" style="height:8px;"></div><div class="label">space-2</div><div class="val">8px</div></div>
  <div class="token"><div class="bar" style="height:12px;"></div><div class="label">space-3</div><div class="val">12px</div></div>
  <div class="token"><div class="bar" style="height:16px;"></div><div class="label">space-4</div><div class="val">16px</div></div>
  <div class="token"><div class="bar" style="height:20px;"></div><div class="label">space-5</div><div class="val">20px</div></div>
  <div class="token"><div class="bar" style="height:24px;"></div><div class="label">space-6</div><div class="val">24px</div></div>
  <div class="token"><div class="bar" style="height:32px;"></div><div class="label">space-8</div><div class="val">32px</div></div>
  <div class="token"><div class="bar" style="height:40px;"></div><div class="label">space-10</div><div class="val">40px</div></div>
  <div class="token"><div class="bar" style="height:48px;"></div><div class="label">space-12</div><div class="val">48px</div></div>
  <div class="token"><div class="bar" style="height:64px;"></div><div class="label">space-16</div><div class="val">64px</div></div>
</div>
</body></html>
