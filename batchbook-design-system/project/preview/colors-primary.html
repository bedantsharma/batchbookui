<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chip { width: 64px; height: 48px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); }
  .label { font-size: 10px; color: var(--fg2); text-align: center; line-height: 1.3; }
  .val { font-size: 9px; color: var(--fg3); font-family: var(--font-mono); }
  .section-title { font-size: 11px; font-weight: 600; color: var(--fg2); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; }
  .section { margin-bottom: 16px; }
</style>
</head><body>
<div class="section">
  <div class="section-title">Primary Purple</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#f5eeff"></div><div class="label">50</div><div class="val">#f5eeff</div></div>
    <div class="swatch"><div class="chip" style="background:#ede6ff"></div><div class="label">100</div><div class="val">#ede6ff</div></div>
    <div class="swatch"><div class="chip" style="background:#d6c3ff"></div><div class="label">200</div><div class="val">#d6c3ff</div></div>
    <div class="swatch"><div class="chip" style="background:#b88fff"></div><div class="label">300</div><div class="val">#b88fff</div></div>
    <div class="swatch"><div class="chip" style="background:#a263ff"></div><div class="label">400</div><div class="val">#a263ff</div></div>
    <div class="swatch"><div class="chip" style="background:#863bff; outline: 2px solid #BB86FC; outline-offset:2px;"></div><div class="label" style="color:#BB86FC;font-weight:700;">500 ★</div><div class="val">#863bff</div></div>
    <div class="swatch"><div class="chip" style="background:#7e14ff"></div><div class="label">600</div><div class="val">#7e14ff</div></div>
    <div class="swatch"><div class="chip" style="background:#6b00e0"></div><div class="label">700</div><div class="val">#6b00e0</div></div>
    <div class="swatch"><div class="chip" style="background:#5400b0"></div><div class="label">800</div><div class="val">#5400b0</div></div>
    <div class="swatch"><div class="chip" style="background:#3d0080"></div><div class="label">900</div><div class="val">#3d0080</div></div>
  </div>
</div>
<div class="section">
  <div class="section-title">MUI Dark Theme Roles</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#BB86FC; outline:2px solid #BB86FC; outline-offset:2px;"></div><div class="label" style="color:#BB86FC;font-weight:700;">Primary</div><div class="val">#BB86FC</div></div>
    <div class="swatch"><div class="chip" style="background:#3700B3"></div><div class="label">Container</div><div class="val">#3700B3</div></div>
    <div class="swatch"><div class="chip" style="background:#03DAC6"></div><div class="label">Secondary</div><div class="val">#03DAC6</div></div>
    <div class="swatch"><div class="chip" style="background:#018786"></div><div class="label">Sec Cont.</div><div class="val">#018786</div></div>
  </div>
</div>
</body></html>
